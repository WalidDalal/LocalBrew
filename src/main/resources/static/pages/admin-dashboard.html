<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard amministratore - Local Brew</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="auth-page">
<main class="auth-shell dashboard-shell">
  <section class="auth-card dashboard-card">

    <div class="dashboard-header">
      <div>
        <h1>Amministrazione</h1>
        <p>Gestisci locali e recensioni.</p>
      </div>
      <div class="dashboard-header-actions">
        <button class="admin-new-drink-btn" id="admin-open-drawer">
          <i class="fa-solid fa-beer-mug-empty"></i> Nuovo drink
        </button>
        <a class="dashboard-link" href="../index.html">
          <i class="fa-solid fa-map-location-dot"></i> Mappa
        </a>
      </div>
    </div>

    <div class="admin-two-col">

      <!-- COLONNA 1: lista locali -->
      <section class="admin-col admin-venues-col">
        <h2 class="dashboard-col-title">
          <i class="fa-solid fa-store"></i>
          Locali
        </h2>

        <!-- Ricerca + filtri status -->
        <div class="admin-search-wrap">
          <i class="fa-solid fa-magnifying-glass admin-search-icon"></i>
          <input
            id="admin-venue-search"
            class="admin-search-input"
            type="search"
            placeholder="Cerca locale o owner…"
            autocomplete="off"
          >
        </div>
        <div class="admin-status-filters" role="group" aria-label="Filtra per stato">
          <button class="admin-status-pill admin-status-pill--active" data-status="">Tutti</button>
          <button class="admin-status-pill" data-status="ACTIVE">
            <i class="fa-solid fa-circle-check"></i> Attivi
          </button>
          <button class="admin-status-pill" data-status="SUSPENDED">
            <i class="fa-solid fa-circle-pause"></i> Sospesi
          </button>
          <button class="admin-status-pill" data-status="PENDING">
            <i class="fa-solid fa-clock"></i> In attesa
          </button>
        </div>

        <div id="admin-venues" aria-live="polite">
          <p class="dashboard-message">Caricamento locali...</p>
        </div>
      </section>

      <!-- COLONNA 2: recensioni -->
      <section class="admin-col admin-review-col" id="admin-review-col">
        <h2 class="dashboard-col-title">
          <i class="fa-solid fa-comments"></i>
          Recensioni
        </h2>
        <p class="dashboard-message admin-review-hint" id="admin-review-hint">
          Clicca "Recensioni" su un locale per vederle qui.
        </p>
        <div class="admin-review-venue-name hidden" id="admin-review-venue-name"></div>
        <div class="admin-review-list" id="admin-reviews" aria-live="polite"></div>
      </section>

    </div>

  </section>
</main>

<!-- Overlay -->
<div class="admin-drawer-overlay" id="admin-drawer-overlay" aria-hidden="true"></div>

<!-- Drawer: Nuovo drink -->
<aside class="admin-drawer" id="admin-drink-drawer" role="dialog" aria-modal="true" aria-label="Nuovo drink globale">
  <div class="admin-drawer-header">
    <h2><i class="fa-solid fa-beer-mug-empty"></i> Nuovo drink</h2>
    <button class="admin-drawer-close" id="admin-close-drawer" aria-label="Chiudi">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <div class="admin-drawer-body">
    <p class="dashboard-message" style="margin-bottom:10px;">Drink globali, disponibili a tutti i locali senza prezzo.</p>
    <p class="auth-message" id="admin-drink-message" aria-live="polite"></p>

    <form class="auth-form" id="admin-drink-form">
      <label for="admin-drink-name">Nome</label>
      <input id="admin-drink-name" type="text" maxlength="100" required>

      <label for="admin-drink-description">Descrizione</label>
      <textarea id="admin-drink-description" rows="3" maxlength="300"></textarea>

      <div class="form-columns">
        <div>
          <label for="admin-drink-category">Categoria</label>
          <select id="admin-drink-category" required>
            <option value="IPA">IPA</option>
            <option value="LAGER">Lager</option>
            <option value="STOUT">Stout</option>
            <option value="ALE">Ale</option>
            <option value="WHEAT">Wheat</option>
            <option value="SOUR">Sour</option>
          </select>
        </div>
        <div>
          <label for="admin-drink-abv">ABV</label>
          <input id="admin-drink-abv" type="number" step="0.1" min="0" max="100">
        </div>
      </div>

      <label for="admin-drink-origin">Origine</label>
      <input id="admin-drink-origin" type="text" maxlength="100">

      <label for="admin-drink-image-file">Immagine birra</label>
      <div class="upload-field" id="admin-drink-image-upload-field">
        <input type="file" id="admin-drink-image-file" accept="image/jpeg,image/png,image/webp" class="upload-file-input">
        <label for="admin-drink-image-file" class="upload-file-label">
          <i class="fa-solid fa-arrow-up-from-bracket"></i>
          <span id="admin-drink-image-filename">Scegli immagine (JPG, PNG, WEBP · max 5 MB)</span>
        </label>
        <img id="admin-drink-image-preview" class="upload-preview hidden" alt="Anteprima immagine birra">
        <button type="button" class="upload-remove hidden" id="admin-drink-image-remove" aria-label="Rimuovi immagine">
          <i class="fa-solid fa-xmark"></i> Rimuovi
        </button>
      </div>
      <input type="hidden" id="admin-drink-image-uri">

      <button type="submit" class="auth-submit">
        <i class="fa-solid fa-plus"></i> Crea drink
      </button>
    </form>
  </div>
</aside>

<button type="button" class="theme-toggle-floating" id="theme-toggle" aria-label="Passa alla modalità notte"><i class="fa-solid fa-moon"></i></button>
  <script type="module" src="../js/theme-init.js"></script>
<script type="module" src="../js/admin-dashboard.js"></script>
</body>

</html>
