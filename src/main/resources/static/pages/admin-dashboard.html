<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard amministratore - Local Brew</title>

  <!-- Stili gia utilizzati dalle pagine login e registrazione. -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="auth-page">
  <main class="auth-shell dashboard-shell">
    <section class="auth-card dashboard-card">
      <div class="dashboard-header">
        <div>
          <h1>Gestione locali</h1>
          <p>Attiva o sospendi i locali registrati su Local Brew.</p>
        </div>
        <a class="dashboard-link" href="../index.html">Mappa</a>
      </div>

      <div class="dashboard-grid admin-dashboard-grid">
        <section class="dashboard-list">
          <h2>Locali</h2>
          <div id="admin-venues" aria-live="polite">
            <p class="dashboard-message">Caricamento locali...</p>
          </div>
        </section>

        <section class="dashboard-list">
          <h2>Nuovo drink</h2>
          <p class="dashboard-message">Crea drink globali, senza prezzo.</p>
          <p class="auth-message" id="admin-drink-message" aria-live="polite"></p>

          <form class="auth-form" id="admin-drink-form">
            <label for="admin-drink-name">Nome</label>
            <input id="admin-drink-name" type="text" maxlength="100" required>

            <label for="admin-drink-description">Descrizione</label>
            <textarea id="admin-drink-description" rows="3" maxlength="300"></textarea>

            <div class="form-columns">
              <div>
                <label for="admin-drink-category">Categoria</label>
                <select id="admin-drink-category" required>
                  <option value="IPA">IPA</option>
                  <option value="LAGER">Lager</option>
                  <option value="STOUT">Stout</option>
                  <option value="ALE">Ale</option>
                  <option value="WHEAT">Wheat</option>
                  <option value="SOUR">Sour</option>
                </select>
              </div>
              <div>
                <label for="admin-drink-abv">ABV</label>
                <input id="admin-drink-abv" type="number" step="0.1" min="0" max="100">
              </div>
            </div>

            <label for="admin-drink-origin">Origine</label>
            <input id="admin-drink-origin" type="text" maxlength="100">

            <label for="admin-drink-image-uri">URL immagine</label>
            <input id="admin-drink-image-uri" type="url" placeholder="https://.../birra.jpg">

            <button type="submit" class="auth-submit">Crea drink</button>
          </form>
        </section>
      </div>
    </section>
  </main>

  <!-- Carica il controllo ruolo ADMIN e la gestione dei locali. -->
  <script type="module" src="../js/admin-dashboard.js"></script>
</body>

</html>
