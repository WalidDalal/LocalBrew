<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi - Local Brew</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <a href="../index.html" class="auth-logo">
      <img src="../assets/icons/full.png" alt="Local Brew">
    </a>

    <section class="auth-card">
      <h1>Accedi</h1>
      <p>Entra nel tuo account Local Brew.</p>

      <p class="auth-message" id="auth-message" aria-live="polite"></p>

      <form class="auth-form" id="login-form">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="email">

        <label for="login-password">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password">

        <button type="submit" class="auth-submit">Accedi</button>
      </form>

      <p class="auth-switch">
        Non hai un account?
        <a href="register.html">Registrati</a>
      </p>

      <p class="auth-home">
        <a href="../index.html">
          <i class="fa-solid fa-arrow-left"></i>
          Torna alla home
        </a>
      </p>
    </section>
  </main>

  <script type="module" src="../js/auth.js"></script>
</body>
</html>
