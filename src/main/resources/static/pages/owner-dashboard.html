<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard proprietario - Local Brew</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="auth-page">
<main class="auth-shell dashboard-shell">
    <section class="auth-card dashboard-card">
        <div class="dashboard-header">
            <div>
                <h1>Gestione locali</h1>
                <p>Crea, aggiorna o elimina i tuoi locali.</p>
            </div>
            <a class="dashboard-link" href="../index.html">Mappa</a>
        </div>

        <p class="auth-message" id="owner-message" aria-live="polite"></p>

        <div class="dashboard-grid">
            <form class="auth-form" id="venue-form">
                <input type="hidden" id="venue-id">

                <label for="venue-name">Nome locale</label>
                <input id="venue-name" type="text" maxlength="50" required>

                <label for="venue-description">Descrizione</label>
                <textarea id="venue-description" rows="4" maxlength="500"></textarea>

                <label for="venue-city">Citta</label>
                <input id="venue-city" type="text" maxlength="50" required>

                <label for="venue-address">Indirizzo</label>
                <input id="venue-address" type="text" maxlength="70" required>

                <label for="venue-type">Tipo locale</label>
                <select id="venue-type" required>
                    <option value="BAR">Bar</option>
                    <option value="PUB">Pub</option>
                    <option value="BREWERY">Birrificio</option>
                    <option value="RESTAURANT">Ristorante</option>
                    <option value="BEER_STORE">Beer store</option>
                </select>

                <label for="venue-image-uri">URL immagine</label>
                <input id="venue-image-uri" type="url" placeholder="https://.../foto.jpg">

                <div class="dashboard-actions">
                    <button type="submit" class="auth-submit" id="venue-submit">Crea locale</button>
                    <button type="button" class="secondary-button hidden" id="venue-cancel">Annulla modifica</button>
                </div>
            </form>

            <section class="dashboard-list" aria-live="polite">
                <h2>I tuoi locali</h2>
                <div id="owner-venues">
                    <p class="dashboard-message">Caricamento locali...</p>
                </div>
            </section>
        </div>

        <section class="dashboard-section">
            <div class="dashboard-header compact-header">
                <div>
                    <h2>Birre dei locali</h2>
                    <p>Associa drink esistenti ai tuoi locali oppure crea una nuova birra con prezzo.</p>
                </div>
            </div>

            <p class="auth-message" id="drink-message" aria-live="polite"></p>

            <label class="dashboard-label" for="drink-venue-select">Locale</label>
            <select id="drink-venue-select" class="dashboard-control"></select>

            <div class="dashboard-grid drink-dashboard-grid">
                <form class="auth-form" id="existing-drink-form">
                    <h3>Aggiungi drink esistente</h3>

                    <label for="existing-drink-id">Drink</label>
                    <select id="existing-drink-id" required></select>

                    <label for="existing-drink-price">Prezzo</label>
                    <input id="existing-drink-price" type="number" step="0.01" min="0" required>

                    <button type="submit" class="auth-submit">Aggiungi al locale</button>
                </form>

                <form class="auth-form" id="new-drink-form">
                    <h3>Crea nuovo drink</h3>

                    <label for="new-drink-name">Nome</label>
                    <input id="new-drink-name" type="text" maxlength="100" required>

                    <label for="new-drink-description">Descrizione</label>
                    <textarea id="new-drink-description" rows="3" maxlength="300"></textarea>

                    <div class="form-columns">
                        <div>
                            <label for="new-drink-category">Categoria</label>
                            <select id="new-drink-category" required>
                                <option value="IPA">IPA</option>
                                <option value="LAGER">Lager</option>
                                <option value="STOUT">Stout</option>
                                <option value="ALE">Ale</option>
                                <option value="WHEAT">Wheat</option>
                                <option value="SOUR">Sour</option>
                            </select>
                        </div>
                        <div>
                            <label for="new-drink-abv">ABV</label>
                            <input id="new-drink-abv" type="number" step="0.1" min="0" max="100">
                        </div>
                    </div>

                    <label for="new-drink-origin">Origine</label>
                    <input id="new-drink-origin" type="text" maxlength="100">

                    <label for="new-drink-image-uri">URL immagine</label>
                    <input id="new-drink-image-uri" type="url" placeholder="https://.../birra.jpg">

                    <label for="new-drink-price">Prezzo nel locale</label>
                    <input id="new-drink-price" type="number" step="0.01" min="0" required>

                    <button type="submit" class="auth-submit">Crea e aggiungi</button>
                </form>
            </div>

            <section class="dashboard-list drink-list-panel">
                <h3>Menu del locale selezionato</h3>
                <div id="venue-drinks">
                    <p class="dashboard-message">Seleziona un locale.</p>
                </div>
            </section>
        </section>
    </section>
</main>

<script type="module" src="../js/owner-dashboard.js"></script>
</body>

</html>
