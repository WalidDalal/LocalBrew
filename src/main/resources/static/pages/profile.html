<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il mio profilo - Local Brew</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="shortcut icon" href="../assets/icons/favicon.png" type="image/x-icon">
</head>

<body class="auth-page app-page">
<main class="profile-shell app-shell">
    <header class="app-page-header dashboard-header">
            <div class="profile-header-user">
                <div class="profile-avatar-lg"><i class="fa-solid fa-user"></i></div>
                <div>
                    <h1 id="profile-heading-name">Profilo</h1>
                    <p id="profile-heading-email" class="profile-heading-email"></p>
                    <span id="profile-heading-role" class="profile-role-badge"></span>
                </div>
            </div>
            <div class="dashboard-header-actions">
                <a class="btn btn-dashboard hidden" id="profile-dashboard-link" href="#">
                    <i class="fa-solid fa-gauge-high"></i> Dashboard
                </a>
                <a class="btn btn-map" href="../index.html">
                    <i class="fa-solid fa-map-location-dot"></i> Mappa
                </a>
                <button type="button" class="btn btn-logout" data-logout-button>
                    <i class="fa-solid fa-right-from-bracket"></i> Esci
                </button>
            </div>
    </header>

    <section class="app-page-body profile-card">
        <div class="profile-layout">

            <nav class="profile-nav" id="profile-nav" aria-label="Sezioni profilo">
                <!-- Generalità: tutti -->
                <button class="profile-nav-item profile-nav-item--active" data-section="generalita">
                    <i class="fa-solid fa-user-pen"></i> Generalità
                </button>
                <!-- Solo USER -->
                <button class="profile-nav-item hidden" data-section="recensioni">
                    <i class="fa-solid fa-comments"></i> Le mie recensioni
                </button>
                <!-- Solo OWNER -->
                <a class="profile-nav-item hidden btn-nav-locali" href="owner-dashboard.html" id="nav-locali-link">
                    <i class="fa-solid fa-store"></i> I miei locali
                </a>
                <!-- Solo ADMIN -->
                <button class="profile-nav-item hidden" data-section="admin">
                    <i class="fa-solid fa-shield-halved"></i> Amministrazione
                </button>
                <!-- Tutti -->
                <button class="profile-nav-item profile-nav-item--danger" data-section="pericolo">
                    <i class="fa-solid fa-triangle-exclamation"></i> Zona pericolosa
                </button>
            </nav>

            <div class="profile-content" id="profile-content">
                <p class="dashboard-message">Caricamento...</p>
            </div>

        </div>

    </section>
</main>

<button type="button" class="theme-toggle-floating" id="theme-toggle" aria-label="Passa alla modalità notte"><i class="fa-solid fa-moon"></i></button>
  <script type="module" src="../js/theme-init.js"></script>
<script type="module" src="../js/profile.js"></script>
</body>
</html>
